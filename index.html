<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rukn Najm Muwailah Grocery</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        text-align: center;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url('https://images.unsplash.com/photo-1542838132-92c53300491e') no-repeat center/cover;
    }

    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.65);
        z-index: 0;
    }

    .container {
        position: relative;
        z-index: 1;
        background: rgba(0,0,0,0.6);
        padding: 25px;
        border-radius: 20px;
        width: 90%;
        max-width: 420px;
        backdrop-filter: blur(10px);
    }

    h1 { font-size: 22px; }

    p {
        margin: 5px 0;
        font-size: 14px;
        color: #ddd;
    }

    .btn {
        display: block;
        margin: 10px auto;
        padding: 12px;
        border-radius: 30px;
        text-decoration: none;
        color: white;
        font-weight: bold;
        width: 85%;
    }

    .whatsapp { background: #25D366; }
    .maps { background: #EA4335; }

    .products {
        margin-top: 15px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    .product-btn {
        background: rgba(255,255,255,0.15);
        padding: 10px;
        border-radius: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    .product-btn:hover {
        background: #25D366;
    }

    .icon {
        font-size: 22px;
    }

    .label {
        font-size: 12px;
        margin-top: 5px;
    }

    .lang-switch button {
        margin: 3px;
        padding: 6px 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

</style>
</head>

<body>

<div class="container">

    <!-- LANGUAGE SWITCH -->
    <div class="lang-switch">
        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('ar')">عربي</button>
        <button onclick="setLang('ml')">മലയാളം</button>
    </div>

    <h1 id="title">Rukn Najm Muwailah Grocery</h1>
    <p id="location">📍 Shop #1, Bulding #535, Muweilah, Sharjah</p>
    <p id="time">🕒 Open Daily: 7:00 AM - 12:00 AM</p>

    <a id="waBtn" class="btn whatsapp" href="#" target="_blank">📲 Order on WhatsApp</a>
    <a class="btn maps" href="https://maps.app.goo.gl/vY7moLEHgmpVTnhe6" target="_blank">📍 Find Us in Google maps</a>

    <p id="quick">🛒 Quick Order:</p>

    <!-- PRODUCTS -->
    <div class="products">
        <div class="product-btn" onclick="order('Milk')">
            <div class="icon">🥛</div>
            <div class="label" id="milk">Milk</div>
        </div>

        <div class="product-btn" onclick="order('Eggs')">
            <div class="icon">🥚</div>
            <div class="label" id="eggs">Eggs</div>
        </div>

        <div class="product-btn" onclick="order('Bread')">
            <div class="icon">🍞</div>
            <div class="label" id="bread">Bread</div>
        </div>

        <div class="product-btn" onclick="order('Rice')">
            <div class="icon">🍚</div>
            <div class="label" id="rice">Rice</div>
        </div>

        <div class="product-btn" onclick="order('Water')">
            <div class="icon">💧</div>
            <div class="label" id="water">Water</div>
        </div>

        <div class="product-btn" onclick="order('Vegetables')">
            <div class="icon">🥦</div>
            <div class="label" id="veg">Vegetables</div>
        </div>
    </div>

</div>

<script>
let lang = 'en';

function setLang(l) {
    lang = l;

    const data = {
        en: {
            title: "Rukn Najm Muwailah Grocery",
            location: "📍 Muweilah, Sharjah",
            time: "🕒 Open Daily: 7:00 AM - 12:00 AM",
            wa: "📲 Order on WhatsApp",
            quick: "🛒 Quick Order:",
            milk: "Milk",
            eggs: "Eggs",
            bread: "Bread",
            rice: "Rice",
            water: "Water",
            veg: "Vegetables"
        },
        ar: {
            title: "بقالة ركن نجم مويلح",
            location: "📍 متجر1، مبنى535، مويلح، الشارقة",
            time: "🕒 مفتوح يومياً: 7 صباحاً - 12 منتصف الليل",
            wa: "📲 اطلب عبر واتساب",
            quick: "🛒 طلب سريع:",
            milk: "حليب",
            eggs: "بيض",
            bread: "خبز",
            rice: "أرز",
            water: "ماء",
            veg: "خضروات"
        },
        ml: {
            title: "റുകുന് നജുമ് മുവൈല ഗ്രോസറി",
            location: "📍ഷോപ് #1, ബിൽഡിംഗ് #535, മുവൈല, ഷാർജ",
            time: "🕒 എല്ലാ ദിവസവും: രാവിലെ 7 - രാത്രി 12",
            wa: "📲 വാട്ട്സാപ്പിൽ ഓർഡർ ചെയ്യുക",
            quick: "🛒 വേഗത്തിൽ ഓർഡർ:",
            milk: "പാൽ",
            eggs: "മുട്ട",
            bread: "ബ്രെഡ്",
            rice: "അരി",
            water: "വെള്ളം",
            veg: "പച്ചക്കറി"
        }
    };

    document.getElementById('title').innerText = data[l].title;
    document.getElementById('location').innerText = data[l].location;
    document.getElementById('time').innerText = data[l].time;
    document.getElementById('waBtn').innerText = data[l].wa;
    document.getElementById('quick').innerText = data[l].quick;

    document.getElementById('milk').innerText = data[l].milk;
    document.getElementById('eggs').innerText = data[l].eggs;
    document.getElementById('bread').innerText = data[l].bread;
    document.getElementById('rice').innerText = data[l].rice;
    document.getElementById('water').innerText = data[l].water;
    document.getElementById('veg').innerText = data[l].veg;
}

function order(item) {
    const messages = {
        en: "Hi, I want to order ",
        ar: "مرحبا، أريد طلب ",
        ml: "ഹായ്, എനിക്ക് വേണം "
    };

    let msg = messages[lang] + item;
    let url = "https://wa.me/971509649695?text=" + encodeURIComponent(msg);
    window.open(url, '_blank');
}

setLang('en');
document.getElementById("waBtn").href =
"https://wa.me/971509649695?text=Hi%20I%20want%20to%20order%20groceries";
</script>

</body>
</html>
