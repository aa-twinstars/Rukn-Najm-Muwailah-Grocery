<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rukn Najm Muwailah Grocery</title>

<style>
    :root {
        --primary-green: #25D366;
        --error-red: #EA4335;
        --bg-overlay: rgba(0,0,0,0.75);
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: white;
        text-align: center;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url('https://images.unsplash.com/photo-1542838132-92c53300491e') no-repeat center/cover;
        background-attachment: fixed;
    }

    body::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 0;
    }

    .container {
        position: relative;
        z-index: 1;
        background: rgba(0,0,0,0.6);
        padding: 20px;
        border-radius: 24px;
        width: 92%;
        max-width: 420px;
        backdrop-filter: blur(15px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    @keyframes pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
    .animate-pop { animation: pop 0.3s ease-out; }

    .lang-switch button {
        margin: 5px;
        padding: 8px 14px;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        cursor: pointer;
        background: rgba(255,255,255,0.1);
        color: white;
        font-weight: 600;
    }

    .header-info { font-size: 13px; color: #ccc; margin: 4px 0; }

    .btn-container { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
    .btn {
        display: flex; align-items: center; justify-content: center;
        padding: 12px; border-radius: 15px; text-decoration: none;
        color: white; font-weight: bold; width: 100%; box-sizing: border-box;
    }
    .whatsapp { background: var(--primary-green); }
    .call { background: #007AFF; }
    .maps { background: var(--error-red); }
    .btn img { width: 20px; margin-right: 10px; }

    .products {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 15px;
    }
    .product-btn {
        background: rgba(255,255,255,0.1);
        padding: 12px 5px;
        border-radius: 18px;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.05);
        transition: 0.2s;
    }
    
    .product-btn img {
        width: 60px; height: 60px;
        object-fit: cover; border-radius: 12px; margin-bottom: 8px;
    }
    .product-label { font-size: 11px; font-weight: 500; }

    .selection-popup {
        display: none; position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%); background: #1a1a1a;
        padding: 25px; border-radius: 24px; z-index: 100;
        width: 85%; max-width: 340px;
    }
    select, textarea, input {
        width: 100%; padding: 12px; border-radius: 12px; margin-bottom: 12px;
        background: #2a2a2a; color: white; border: 1px solid #444; box-sizing: border-box;
    }

    .cart {
        margin-top: 25px; background: rgba(0,0,0,0.4);
        padding: 20px; border-radius: 20px; text-align: left;
    }
    .cart-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        font-size: 13px;
    }
    .remove-btn { color: var(--error-red); background: none; border: none; font-size: 18px; cursor: pointer; }

    #successOverlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-overlay); z-index: 1000;
        flex-direction: column; justify-content: center; align-items: center;
        backdrop-filter: blur(8px);
    }
    .checkmark-circle {
        width: 70px; height: 70px; border-radius: 50%;
        background: var(--primary-green); display: flex;
        justify-content: center; align-items: center; font-size: 35px;
        margin-bottom: 15px;
    }
</style>
</head>
<body>

<div id="successOverlay">
    <div class="checkmark-circle">✓</div>
    <h2 id="processingText">Processing Order...</h2>
</div>

<div class="container">
    <div class="lang-switch">
        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('ar')">عربي</button>
        <button onclick="setLang('ml')">മലയാളം</button>
    </div>

    <h1 id="title">Rukn Najm Muwailah Grocery</h1>
    <p id="location" class="header-info">📍 Shop #1, Building #535, Muweilah, Sharjah</p>
    <p id="time" class="header-info">🕒 Open Daily: 7:00 AM - 12:00 AM</p>
    
    <div class="btn-container">
        <a id="waBtn" class="btn whatsapp" href="https://wa.me/971509649695" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA"> Order on WhatsApp
        </a>
        <a id="callBtn" class="btn call" href="tel:+971509649695">📞 Call Now</a>
        <a id="mapsBtn" class="btn maps" href="https://maps.google.com/?cid=6500354278498518338&g_mp=CiVnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLkdldFBsYWNl" target="_blank">📍 Google Maps</a>
    </div>

    <div class="quick-order-title" id="quickOrderLabel" style="font-weight: bold; border-bottom: 1px solid #555; padding-bottom: 5px; margin-bottom: 10px;">Quick Order</div>

<div class="products">
        <div class="product-btn" onclick="openPopup('Milk')">
            <div style="font-size: 40px; margin-bottom: 8px;">🥛</div>
            <div class="product-label" id="milkLabel">Milk</div>
        </div>
        <div class="product-btn" onclick="openPopup('Eggs')">
            <div style="font-size: 40px; margin-bottom: 8px;">🥚</div>
            <div class="product-label" id="eggsLabel">Eggs</div>
        </div>
        <div class="product-btn" onclick="openPopup('Bread')">
            <div style="font-size: 40px; margin-bottom: 8px;">🍞</div>
            <div class="product-label" id="breadLabel">Bread</div>
        </div>
        <div class="product-btn" onclick="openPopup('Rice')">
            <div style="font-size: 40px; margin-bottom: 8px;">🍚</div>
            <div class="product-label" id="riceLabel">Rice</div>
        </div>
        <div class="product-btn" onclick="openPopup('Water')">
            <div style="font-size: 40px; margin-bottom: 8px;">💧</div>
            <div class="product-label" id="waterLabel">Water</div>
        </div>
        <div class="product-btn" onclick="openPopup('Vegetables')">
            <div style="font-size: 40px; margin-bottom: 8px;">🥗</div>
            <div class="product-label" id="vegLabel">Vegetables</div>
        </div>
    </div>

    <div id="selectionPopup" class="selection-popup">
        <h3 id="popupTitle">Select Option</h3>
        <select id="primarySelect"></select>
        <div id="vegWeightContainer" style="display:none;">
            <p id="weightTitle" style="color:var(--primary-green); font-weight:bold; margin-bottom:5px;">Select Weight:</p>
            <select id="weightSelect"></select>
        </div>
        <button class="btn whatsapp" onclick="confirmAddition()" id="addBtn">Add to Cart</button>
        <button onclick="closePopup()" style="background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>

    <div class="cart" id="cartSection">
        <h3 id="cartHeader" style="margin:0;">🛒 Cart</h3>
        <div id="cartItems" style="margin: 15px 0;">Empty</div>
        
        <div id="deliveryForm" style="display:none;">
            <input type="text" id="addressInput">
            <textarea id="noteInput" rows="2"></textarea>
        </div>

        <button class="btn whatsapp" onclick="checkout()" id="sendBtn">📲 Send Order</button>
        <button id="clearBtn" onclick="clearCart()" style="background:none; border:none; color:#999; font-size:11px; width:100%; margin-top:10px; cursor:pointer;">Clear All</button>
    </div>
</div>

<script>
let lang = 'en';
let cart = {};
let currentCategory = '';

const data = {
    en: {
        title: "Rukn Najm Muwailah Grocery",
        wa: "Order on WhatsApp", call: "Call Now", maps: "📍 Google Maps",
        milkLabel: "Milk", eggsLabel: "Eggs", breadLabel: "Bread", riceLabel: "Rice", waterLabel: "Water", vegLabel: "Vegetables",
        cartHeader: "🛒 Cart", cartEmpty: "Empty", add: "Add to Cart", send: "📲 Send Order", weightLabel: "Select Weight:",
        clear: "Clear All Items", addrPlace: "Building Name/No & Flat No.", notePlace: "Special Instructions...",
        processing: "Processing Order...",
        options: {
            Milk: ["200 ml", "360 ml", "500 ml", "1 litre", "2 litre"],
            Eggs: ["6 pieces", "15 pieces", "30 pieces"],
            Bread: ["Arabic Bread White Big (6 pcs)", "Arabic Bread White Small (4 pcs)", "Arabic Bread Brown Small (4 pcs)", "Slice White Bread Big (600 grams)", "Slice White Bread Small (300 grams)", "Slice Milk Bread Big (600 grams)", "Slice Milk Bread Small (325 grams)", "Burger Bun (6 Pcs)", "Samoon (6 pcs)", "Sandwitch (Chocolate)", "Sandwitch (Zatar)", "Sandwitch (Cheese)", "Sandwitch (Chicken Mayonese)"],
            Rice: ["A1 Rice Basmati (1 kg)", "Rice Basmati (5 kg)", "Rice Basmati (10 kg)", "Sinnara Rice (1 kg)", "Sinnara Rice (2 kg)", "Sinnara Rice (10 kg)", "Sunwhite Rice (1 kg)", "Sunwhite Rice (2 kg)", "Sunwhite Rice (5 kg)", "Matta Rice (1 kg)", "Matta Rice (2 kg)", "Matta Rice (5 kg)"],
            Water: ["300 ml", "500 ml", "1.5 litres", "5 litres", "20 litres"],
            Vegetables: ["Tomato", "Onion Big", "Potato", "Chilli"],
            Weights: ["250g", "500g", "1kg", "2kg", "5kg"]
        }
    },
    ar: {
        title: "بقالة ركن نجم مويلح",
        wa: "اطلب عبر واتساب", call: "اتصل الآن", maps: "📍 خرائط جوجل",
        milkLabel: "حليب", eggsLabel: "بيض", breadLabel: "خبز", riceLabel: "أرز", waterLabel: "ماء", vegLabel: "خضروات",
        cartHeader: "🛒 السلة", cartEmpty: "فارغة", add: "إضافة للسلة", send: "📲 إرسال الطلب", weightLabel: "اختر الوزن:",
        clear: "مسح الكل", addrPlace: "اسم البناية ورقم الشقة", notePlace: "ملاحظات خاصة...",
        processing: "جاري الطلب...",
        options: {
            Milk: ["200 مل", "360 مل", "500 مل", "1 لتر", "2 لتر"],
            Eggs: ["6 قطع", "15 قطعة", "30 قطعة"],
            Bread: ["خبز عربي أبيض كبير (6 قطع)", "خبز عربي أبيض صغير (4 قطع)", "خبز عربي أسمر صغير (4 قطع)", "خبز توست أبيض كبير", "خبز توست أبيض صغير", "خبز توست بالحليب كبير", "خبز توست بالحليب صغير", "صمون برجر (6 قطع)", "صمون (6 قطع)", "ساندويتش (شوكولاتة)", "ساندويتش (زعتر)", "ساندويتش (جبنة)", "ساندويتش (دجاج مايونيز)"],
            Rice: ["أرز بسمتي A1 (1 كجم)", "أرز بسمتي (5 كجم)", "أرز بسمتي (10 كجم)", "أرز سنارة (1 كجم)", "أرز سنارة (2 كجم)", "أرز سنارة (10 كجم)", "أرز صن وايت (1 كجم)", "أرز صن وايت (2 كجم)", "أرز صن وايت (5 كجم)", "أرز ماتا (1 كجم)", "أرز ماتا (2 كجم)", "أرز ماتا (5 كجم)"],
            Water: ["300 مل", "500 مل", "1.5 لتر", "5 لتر", "20 لتر"],
            Vegetables: ["طماطم", "بصل كبير", "بطاطس", "فلفل"],
            Weights: ["250 جرام", "500 جرام", "1 كجم", "2 كجم", "5 كجم"]
        }
    },
    ml: {
        title: "റുകുന് നജുമ് മുവൈല ഗ്രോസറി",
        wa: "വാട്ട്സാപ്പിൽ ഓർഡർ ചെയ്യുക", call: "വിളിക്കുക", maps: "📍 ഗൂഗിൾ മാപ്പ്",
        milkLabel: "പാൽ", eggsLabel: "മുട്ട", breadLabel: "ബ്രെഡ്", riceLabel: "അരി", waterLabel: "വെള്ളം", vegLabel: "പച്ചക്കറി",
        cartHeader: "🛒 കാർട്ട്", cartEmpty: "ശൂന്യം", add: "കാർട്ടിലേക്ക് ചേർക്കുക", send: "📲 ഓർഡർ അയക്കുക", weightLabel: "അളവ് തിരഞ്ഞെടുക്കുക:",
        clear: "എല്ലാം ഒഴിവാക്കുക", addrPlace: "കെട്ടിടം, ഫ്ലാറ്റ് നമ്പർ", notePlace: "നിർദ്ദേശങ്ങൾ...",
        processing: "ഓർഡർ ചെയ്യുന്നു...",
        options: {
            Milk: ["200 ml", "360 ml", "500 ml", "1 ലിറ്റർ", "2 ലിറ്റർ"],
            Eggs: ["6 എണ്ണം", "15 എണ്ണം", "30 എണ്ണം"],
            Bread: ["അറബിക് ബ്രെഡ് വൈറ്റ് വലുത് (6 എണ്ണം)", "അറബിക് ബ്രെഡ് വൈറ്റ് ചെറുത് (4 എണ്ണം)", "അറബിക് ബ്രെഡ് ബ്രൗൺ ചെറുത് (4 എണ്ണം)", "സ്ലൈസ് വൈറ്റ് ബ്രെഡ് വലുത് (600g)", "സ്ലൈസ് വൈറ്റ് ബ്രെഡ് ചെറുത് (300g)", "സ്ലൈസ് മിൽക്ക് ബ്രെഡ് വലുത് (600g)", "സ്ലൈസ് മിൽക്ക് ബ്രെഡ് ചെറുത് (325g)", "ബർഗർ ബൺ (6 എണ്ണം)", "സമൂൺ (6 എണ്ണം)", "സാൻഡ്‌വിച്ച് (ചോക്ലേറ്റ്)", "സാൻഡ്‌വിച്ച് (സതർ)", "സാൻഡ്‌വിച്ച് (ചീസ്)", "സാൻഡ്‌വിച്ച് (ചിക്കൻ മയോണൈസ്)"],
            Rice: ["A1 ബസുമതി അരി (1 kg)", "ബസുമതി അരി (5 kg)", "ബസുമതി അരി (10 kg)", "സിന്നാര അരി (1 kg)", "സിന്നാര അരി (2 kg)", "സിന്നാര അരി (10 kg)", "സൺവൈറ്റ് അരി (1 kg)", "സൺവൈറ്റ് അരി (2 kg)", "സൺവൈറ്റ് അരി (5 kg)", "മട്ട അരി (1 kg)", "മട്ട അരി (2 kg)", "മട്ട അരി (5 kg)"],
            Water: ["300 ml", "500 ml", "1.5 ലിറ്റർ", "5 ലിറ്റർ", "20 ലിറ്റർ"],
            Vegetables: ["തക്കാളി", "സവാള", "ഉരുളക്കിഴങ്ങ്", "പച്ചമുളക്"],
            Weights: ["250g", "500g", "1kg", "2kg", "5kg"]
        }
    }
};

function setLang(l) {
    lang = l; const d = data[l];
    document.getElementById('title').innerText = d.title;
    document.getElementById('waBtn').innerHTML = `<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA"> ${d.wa}`;
    document.getElementById('callBtn').innerText = `📞 ${d.call}`;
    document.getElementById('mapsBtn').innerText = d.maps;
    document.getElementById('milkLabel').innerText = d.milkLabel;
    document.getElementById('eggsLabel').innerText = d.eggsLabel;
    document.getElementById('breadLabel').innerText = d.breadLabel;
    document.getElementById('riceLabel').innerText = d.riceLabel;
    document.getElementById('waterLabel').innerText = d.waterLabel;
    document.getElementById('vegLabel').innerText = d.vegLabel;
    document.getElementById('cartHeader').innerText = d.cartHeader;
    document.getElementById('addBtn').innerText = d.add;
    document.getElementById('sendBtn').innerText = d.send;
    document.getElementById('clearBtn').innerText = d.clear;
    document.getElementById('addressInput').placeholder = d.addrPlace;
    document.getElementById('noteInput').placeholder = d.notePlace;
    document.getElementById('processingText').innerText = d.processing;
    renderCart();
}

function openPopup(cat) {
    currentCategory = cat;
    const labelKey = cat === 'Vegetables' ? 'vegLabel' : cat.toLowerCase() + 'Label';
    document.getElementById('popupTitle').innerText = data[lang][labelKey];
    const select = document.getElementById('primarySelect');
    select.innerHTML = "";
    data[lang].options[cat].forEach(opt => {
        let o = document.createElement("option"); o.value = opt; o.text = opt; select.add(o);
    });
    const weightContainer = document.getElementById('vegWeightContainer');
    if (cat === 'Vegetables') {
        weightContainer.style.display = "block";
        const wSelect = document.getElementById('weightSelect');
        wSelect.innerHTML = "";
        data[lang].options.Weights.forEach(w => {
            let o = document.createElement("option"); o.value = w; o.text = w; wSelect.add(o);
        });
    } else { weightContainer.style.display = "none"; }
    document.getElementById('selectionPopup').style.display = "block";
}

function closePopup() { document.getElementById('selectionPopup').style.display = "none"; }

function confirmAddition() {
    const mainVal = document.getElementById('primarySelect').value;
    const weightVal = document.getElementById('weightSelect').value;
    const labelKey = currentCategory === 'Vegetables' ? 'vegLabel' : currentCategory.toLowerCase() + 'Label';
    const prod = data[lang][labelKey];
    let item = (currentCategory === 'Vegetables') ? `${prod}: ${mainVal} (${weightVal})` : `${prod}: ${mainVal}`;
    cart[item] = (cart[item] || 0) + 1;
    const cartSec = document.getElementById('cartSection');
    cartSec.classList.add('animate-pop');
    setTimeout(() => cartSec.classList.remove('animate-pop'), 300);
    renderCart(); closePopup();
}

function renderCart() {
    let html = ""; let entries = Object.keys(cart);
    if (entries.length === 0) {
        html = data[lang].cartEmpty;
        document.getElementById('deliveryForm').style.display = "none";
    } else {
        entries.forEach(key => {
            html += `<div class="cart-item"><span>• ${key} x ${cart[key]}</span>
                     <button class="remove-btn" onclick="removeItem('${key}')">✕</button></div>`;
        });
        document.getElementById('deliveryForm').style.display = "block";
    }
    document.getElementById('cartItems').innerHTML = html;
}

function removeItem(k) { delete cart[k]; renderCart(); }
function clearCart() { cart = {}; renderCart(); }

function checkout() {
    const items = Object.keys(cart);
    if (items.length === 0) return alert("Cart is empty");
    const address = document.getElementById('addressInput').value;
    if (!address) return alert("Please enter your address");
    const note = document.getElementById('noteInput').value;
    document.getElementById('successOverlay').style.display = "flex";
    setTimeout(() => {
        let msg = `*New Order - Rukn Najm Muwailah*\n\n`;
        items.forEach(k => msg += `• ${k} x ${cart[k]}\n`);
        msg += `\n📍 *Address:* ${address}`;
        if (note) msg += `\n📝 *Note:* ${note}`;
        window.open("https://wa.me/971509649695?text=" + encodeURIComponent(msg), '_blank');
        document.getElementById('successOverlay').style.display = "none";
    }, 1500);
}

setLang('en');
</script>
</body>
</html>
