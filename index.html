<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rukn Najm Muwailah Grocery</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url('https://images.unsplash.com/photo-1542838132-92c53300491e') no-repeat center/cover;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    background: rgba(0,0,0,0.6);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 420px;
    backdrop-filter: blur(10px);
}

h1 { font-size: 22px; }
p { margin: 5px 0; font-size: 14px; color: #ddd; }

.btn {
    display: block;
    margin: 10px auto;
    padding: 12px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    width: 85%;
}

.whatsapp { background: #25D366; }
.maps { background: #EA4335; }
.call { background: #007BFF; }

.products {
    margin-top: 15px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.product-btn {
    background: rgba(255,255,255,0.15);
    padding: 10px;
    border-radius: 15px;
    cursor: pointer;
}

.icon { font-size: 22px; }
.label { font-size: 12px; margin-top: 5px; }

.cart {
    margin-top: 20px;
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 15px;
    text-align: left;
}

.checkout {
    background: #25D366;
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    border-radius: 20px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.selection-popup {
    background: rgba(0,0,0,0.9);
    padding: 15px;
    border-radius: 15px;
    margin-top: 10px;
}

.selection-popup select, .selection-popup button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div class="container">

<h1>Rukn Najm Muwailah Grocery</h1>
<p>📍 Shop #1, Building #535, Muweilah, Sharjah</p>
<p>🕒 Open Daily: 7:00 AM - 12:00 AM</p>

<!-- BUTTONS -->
<a id="waBtn" class="btn whatsapp" href="https://wa.me/971509649695" target="_blank">
📲 Order on WhatsApp
</a>

<a class="btn call" href="tel:+971509649695">
📞 Call Now
</a>

<a class="btn maps" href="https://maps.app.goo.gl/vY7moLEHgmpVTnhe6" target="_blank">
📍 Find us in Google Maps
</a>

<p>🛒 Quick Order:</p>

<!-- PRODUCTS -->
<div class="products">
    <div class="product-btn" onclick="selectOption('Milk')">
        <div class="icon">🥛</div><div class="label">Milk</div>
    </div>

    <div class="product-btn" onclick="selectOption('Eggs')">
        <div class="icon">🥚</div><div class="label">Eggs</div>
    </div>

    <div class="product-btn" onclick="selectOption('Bread')">
        <div class="icon">🍞</div><div class="label">Bread</div>
    </div>

    <div class="product-btn" onclick="selectOption('Rice')">
        <div class="icon">🍚</div><div class="label">Rice</div>
    </div>

    <div class="product-btn" onclick="selectOption('Water')">
        <div class="icon">💧</div><div class="label">Water</div>
    </div>

    <div class="product-btn" onclick="addCart('Vegetables')">
        <div class="icon">🥦</div><div class="label">Vegetables</div>
    </div>
</div>

<!-- POPUP -->
<div id="selectionPopup" class="selection-popup" style="display:none;">
    <div id="selectionTitle"></div>
    <select id="selectionOptions"></select>
    <button onclick="confirmSelection()">Add to Cart</button>
</div>

<!-- CART -->
<div class="cart">
    <h3>🛒 Cart</h3>
    <div id="cartItems">Empty</div>
    <button class="checkout" onclick="checkout()">📲 Send Order</button>
</div>

</div>

<script>
let cart = {};
let currentItem = null;

const options = {
Milk: ["200 ml","360 ml","500 ml","1 litre","2 litre"],
Eggs: ["6 pcs","15 pcs","30 pcs"],
Bread: ["Arabic Bread White Big","Burger Bun","Samoon","Sandwich"],
Rice: ["1 kg","5 kg","10 kg"],
Water: ["300 ml","500 ml","1.5L","5L","20L"]
};

function selectOption(item){
    currentItem = item;
    let popup = document.getElementById("selectionPopup");
    let select = document.getElementById("selectionOptions");

    select.innerHTML="";
    options[item].forEach(opt=>{
        let o=document.createElement("option");
        o.text=opt;
        select.add(o);
    });

    document.getElementById("selectionTitle").innerText="Select "+item;
    popup.style.display="block";
}

function confirmSelection(){
    let sel=document.getElementById("selectionOptions").value;
    addCart(currentItem+" - "+sel);
    document.getElementById("selectionPopup").style.display="none";
}

function addCart(item){
    cart[item]=(cart[item]||0)+1;
    renderCart();
}

function renderCart(){
    let html="";
    for(let k in cart){
        html+=k+" x "+cart[k]+"<br>";
    }
    document.getElementById("cartItems").innerHTML=html||"Empty";
}

function checkout(){
    let msg="Hi, I want to order:\n";
    for(let k in cart){
        msg+=k+" x "+cart[k]+"\n";
    }
    let url="https://wa.me/971509649695?text="+encodeURIComponent(msg);
    window.open(url,'_blank');
}
</script>

</body>
</html>
